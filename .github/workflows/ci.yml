name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint GitHub workflows
        uses: rhysd/actionlint@v1

      - name: Enforce release workflow policy
        run: bash scripts/ci/check-release-workflow-policy.sh

  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI_SKIP_POSTINSTALL: '1'

      - name: Typecheck
        run: pnpm typecheck

      - name: Build CLI
        run: pnpm --filter @slayzone/cli build

      - name: Build
        run: pnpm build
        env:
          POSTHOG_API_KEY: ci
          POSTHOG_HOST: https://app.posthog.com
          VITE_CONVEX_URL: https://example.invalid
          VITE_COMMUNITY_DISCORD_URL: ${{ vars.VITE_COMMUNITY_DISCORD_URL || 'https://discord.gg/g7xPHXaU98' }}
          VITE_UPDATES_X_URL: ${{ vars.VITE_UPDATES_X_URL || 'https://x.com/debuglebowski' }}
